# Configuration des mots-clés de scoring pour la veille RSS
# Format YAML — éditable manuellement, rechargé via !veille reload
#
# Deux types de mots-clés :
# - boost : un article qui matche reçoit +500 points par match
#           (les articles "boostés" remontent dans le tri)
# - blacklist : un article qui matche est REJETÉ (filtre dur)
#
# Matching : insensible à la casse, recherche dans titre + summary
# Multi-mots : les espaces dans une entrée signifient "ces mots
#              apparaissent dans cet ordre" (ex: "supply chain" matche
#              "Supply Chain Attack" mais pas "Chain of Supply")
#
# Structure : par catégorie (cyber/ia/dev/tech) + une section "all"
# qui s'applique à toutes les catégories.

all:
  boost: []
  blacklist:
  - Sponsored
  - sponsored content
  - advertorial

cyber:
  boost:
  - vulnérabilité critique
  - critical vulnerability
  - 0-day
  - zero-day
  - RCE
  - remote code execution
  - ransomware
  - data breach
  - fuite de données
  - supply chain
  - patch tuesday
  - CVE
  - exploit
  - backdoor
  - malware
  - APT
  blacklist:
  - Webinar

ia:
  boost:
  - GPT-5
  - GPT-6
  - Claude
  - frontier model
  - safety
  - alignment
  - jailbreak
  - prompt injection
  - benchmark
  - open source
  - open weight
  blacklist:
  - case study
  - testimonial

dev:
  boost:
  - security advisory
  - critical update
  - breaking change
  - deprecation
  - LTS release
  - GA release
  - major release
  blacklist: []

tech:
  boost:
  - intelligence artificielle
  - cybersécurité
  - protection des données
  - RGPD
  - réglementation
  blacklist:
  - test produit
  - test gaming
  - bon plan
  - promo
  - black friday
