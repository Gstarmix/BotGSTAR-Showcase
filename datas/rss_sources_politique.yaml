# Configuration des sources RSS pour BotGSTAR — VEILLE POLITIQUE (Option C)
# Format YAML — éditable manuellement, rechargé via !veille_pol reload
# Champs obligatoires : id (unique), url, category, language, priority, active
#
# category : actu-chaude | arsenal-eco | arsenal-ecologie | arsenal-international
#            | arsenal-social | arsenal-attaques | arsenal-medias
# priority : 1 (top) | 2 (medium) | 3 (low)
#
# Toutes les sources sont en français et vérifiées (HTTP 200 + entries > 0).
#
# PHILOSOPHIE — Option C : "Arsenal Intelligence Unit"
# Catégories orientées USAGE et non IDÉOLOGIE.
# Chaque salon répond à une question concrète :
#   - actu-chaude       : "qu'est-ce qui se passe ce matin ?"
#   - arsenal-eco       : "quel chiffre / argument économique pour répondre ?"
#   - arsenal-ecologie  : "quelle donnée climat / écologique pour étayer ?"
#   - arsenal-international : "que se passe-t-il sur Palestine, Russie, Sahel… ?"
#   - arsenal-social    : "quelle lutte / syndicat / mobilisation a bougé ?"
#   - arsenal-attaques  : "quelle réplique pro-LFI à un argument adverse ?"
#   - arsenal-medias    : "qui dit quoi, qui ment, qui critique le récit dominant ?"
#
# Les sources d'extrême droite ne sont PAS surveillées en propre : elles polluent
# plus qu'elles n'éclairent. À la place, leur narratif est filtré et critiqué via
# arsenal-attaques (analyses pro-LFI), arsenal-medias (critique média), et les
# fact-checks de actu-chaude.

