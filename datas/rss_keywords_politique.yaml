# Configuration des mots-clés de scoring pour la VEILLE POLITIQUE (Option C)
# Format YAML — éditable manuellement, rechargé via !veille_pol reload
#
# Deux types de mots-clés :
# - boost : un article qui matche reçoit +500 points par match
#           (les articles "boostés" remontent dans le tri)
# - blacklist : un article qui matche est REJETÉ (filtre dur)
#
# Matching : insensible à la casse, recherche dans titre + summary
# Multi-mots : les espaces dans une entrée signifient "ces mots
#              apparaissent dans cet ordre"
#
# Section "all" : s'applique à toutes les catégories (anti-pubs).

all:
  boost: []
  blacklist:
  - sponsorisé
  - publi-rédactionnel
  - publicité
  - horoscope
  - people
  - promo
  - advertorial
  - sponsored
  - bons plans
  - code promo

